<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FBI</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #c9a84c;
            --gold-bright: #f0d060;
            --crimson: #8b0000;
            --crimson-bright: #cc1111;
            --navy: #020610;
            --panel: rgba(4,10,26,0.97);
            --glass: rgba(255,255,255,0.03);
            --border-gold: rgba(201,168,76,0.25);
            --border-dim: rgba(255,255,255,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--navy); color: #ddd8c8; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        .mono { font-family: 'Share Tech Mono', monospace; }
        .display { font-family: 'Bebas Neue', cursive; }

        /* SCANLINES */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
            pointer-events: none; z-index: 9999;
        }
        /* GRID */
        .grid-overlay {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(201,168,76,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.035) 1px, transparent 1px);
            background-size: 44px 44px; pointer-events: none; z-index: 0;
        }
        /* CORNERS */
        .corner-tl, .corner-tr, .corner-bl, .corner-br { position: absolute; width: 18px; height: 18px; border-color: var(--gold); border-style: solid; opacity: 0.4; }
        .corner-tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
        .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

        .glass-card { background: var(--panel); border: 1px solid var(--border-gold); border-radius: 4px; box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(201,168,76,0.1); position: relative; }
        .fbi-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(201,168,76,0.2); border-radius: 3px; padding: 12px 16px; color: #e8e4d8; font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.05em; }
        .fbi-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,168,76,0.1); }
        .fbi-input::placeholder { color: #333; letter-spacing: 0.1em; }
        select.fbi-input option { background: #0a0f1e; color: #e8e4d8; }
        textarea.fbi-input { resize: none; }

        .btn-gold { background: linear-gradient(135deg, #7a5e20, #c9a84c, #7a5e20); color: #0a0f1e; font-family: 'Bebas Neue', cursive; letter-spacing: 0.25em; font-size: 1rem; padding: 12px 24px; border: none; border-radius: 3px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(201,168,76,0.2); }
        .btn-gold:hover { box-shadow: 0 4px 30px rgba(201,168,76,0.4); filter: brightness(1.1); }
        .btn-gold:active { transform: scale(0.97); }
        .btn-red { background: linear-gradient(135deg, #5a0000, #8b0000, #5a0000); color: #ffcdd2; font-family: 'Bebas Neue', cursive; letter-spacing: 0.25em; font-size: 1rem; padding: 12px 24px; border: none; border-radius: 3px; cursor: pointer; transition: all 0.2s; }
        .btn-red:hover { filter: brightness(1.2); }
        .btn-ghost { background: transparent; color: var(--gold); font-family: 'Bebas Neue', cursive; letter-spacing: 0.2em; font-size: 0.9rem; padding: 10px 18px; border: 1px solid var(--border-gold); border-radius: 3px; cursor: pointer; transition: all 0.2s; }
        .btn-ghost:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }

        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes scanDown { 0% { transform:translateY(-100%); opacity:0.5; } 100% { transform:translateY(100vh); opacity:0; } }
        @keyframes sealPulse { 0%,100% { filter:drop-shadow(0 0 20px rgba(201,168,76,0.3)); } 50% { filter:drop-shadow(0 0 45px rgba(201,168,76,0.6)); } }
        @keyframes pulseAnim { 0% { box-shadow:0 0 0 0 rgba(22,163,74,0.5); } 50% { box-shadow:0 0 0 6px rgba(22,163,74,0); } 100% { box-shadow:0 0 0 0 rgba(22,163,74,0); } }
        @keyframes ticker { from { transform:translateX(100%); } to { transform:translateX(-200%); } }

        .scan-line { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent); animation:scanDown 4s linear infinite; pointer-events:none; z-index:10; }
        .animate-fade-up { animation: fadeUp 0.5s ease forwards; }
        .pulse-dot { width:8px; height:8px; border-radius:50%; background:#16a34a; box-shadow:0 0 0 0 rgba(22,163,74,0.5); animation:pulseAnim 2s ease-in-out infinite; }
        .ticker-inner { display:inline-block; animation:ticker 30s linear infinite; white-space:nowrap; }

        .bottom-nav { background:rgba(2,6,16,0.98); border-top:1px solid var(--border-gold); }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:8px 10px; border-radius:4px; transition:all 0.2s; position:relative; }
        .nav-item.active { color:var(--gold-bright); }
        .nav-item.active::after { content:''; position:absolute; bottom:-1px; left:20%; width:60%; height:2px; background:var(--gold); border-radius:2px 2px 0 0; }
        .nav-item:not(.active) { color:#2a2a3a; }

        .badge { font-family:'Share Tech Mono',monospace; font-size:0.6rem; padding:3px 8px; border-radius:2px; letter-spacing:0.15em; text-transform:uppercase; }
        .badge-open   { background:rgba(180,30,30,0.15); color:#f87171; border:1px solid rgba(180,30,30,0.3); }
        .badge-closed { background:rgba(30,160,80,0.12); color:#4ade80; border:1px solid rgba(30,160,80,0.25); }
        .badge-gold   { background:rgba(201,168,76,0.12); color:var(--gold); border:1px solid var(--border-gold); }

        .data-row { background:var(--glass); border:1px solid var(--border-dim); border-left:3px solid var(--gold); border-radius:3px; padding:14px 16px; transition:background 0.2s; }
        .data-row:hover { background:rgba(201,168,76,0.04); }
        .data-row-red { border-left-color:var(--crimson-bright); }

        .stat-card { background:var(--glass); border:1px solid var(--border-dim); border-radius:3px; padding:18px 16px; position:relative; overflow:hidden; }
        .stat-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
        .stat-card.blue::before { background:#1d4ed8; }
        .stat-card.red::before  { background:var(--crimson-bright); }
        .stat-card.gold::before { background:var(--gold); }
        .stat-card.green::before { background:#16a34a; }

        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); backdrop-filter:blur(12px); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.2s ease; }

        .wanted-img { width:100%; height:180px; object-fit:cover; filter:grayscale(30%) contrast(1.1); border-bottom:3px solid var(--crimson-bright); }
        .chat-bubble { max-width:75%; padding:9px 13px; border-radius:4px; font-size:0.85rem; line-height:1.5; }
        .chat-bubble.mine   { background:rgba(29,78,216,0.25); border:1px solid rgba(29,78,216,0.3); margin-left:auto; border-bottom-right-radius:0; }
        .chat-bubble.theirs { background:rgba(255,255,255,0.05); border:1px solid var(--border-dim); border-bottom-left-radius:0; }
        .log-entry { font-family:'Share Tech Mono',monospace; font-size:0.72rem; color:#2a3a2a; padding:7px 12px; border-bottom:1px solid rgba(255,255,255,0.03); letter-spacing:0.05em; }
        .log-entry .t { color:var(--gold); }
        .log-entry .u { color:#2a4a3a; }
        .log-entry .a { color:#2a3a4a; }

        .progress-bar { height:3px; background:rgba(201,168,76,0.1); border-radius:2px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-bright)); border-radius:2px; transition:width 1s ease; }

        ::-webkit-scrollbar { width:3px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border-gold); border-radius:2px; }
        .divider { border:none; border-top:1px solid var(--border-dim); margin:14px 0; }
        .hero-title { font-family:'Bebas Neue',cursive; font-size:clamp(2.8rem,9vw,7rem); line-height:0.88; letter-spacing:0.06em; background:linear-gradient(180deg,#f2c84a 0%,#c9a84c 45%,#7a5e20 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .classified-stripe { background:repeating-linear-gradient(-50deg,#8b0000,#8b0000 8px,#111 8px,#111 16px); }
    </style>
</head>
<body>
<div class="grid-overlay"></div>
<div id="root"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, setDoc, doc, deleteDoc, query, orderBy, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";
    const firebaseConfig = { apiKey:"AIzaSyCYgffN2dA7IILMbI2i_1YfERkKWIrpHyA", authDomain:"ek-police.firebaseapp.com", projectId:"ek-police", storageBucket:"ek-police.firebasestorage.app", messagingSenderId:"300605258409", appId:"1:300605258409:web:f265025ffa5592f651c7b8" };
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    window.fbDB    = db;
    window.fbTools = { collection, onSnapshot, setDoc, doc, deleteDoc, query, orderBy, addDoc, updateDoc, serverTimestamp };
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const FBI_RANKS = ["Director","Deputy Director","Associate Deputy Director","Executive Assistant Director","Assistant Director","Deputy Assistant Director","Special Agent in Charge (SAC)","Assistant Special Agent in Charge (ASAC)","Supervisory Special Agent (SSA)","Senior Special Agent","Special Agent"];
const TICKER = "⬛ CLASSIFIED CHANNEL ACTIVE — ALL TRANSMISSIONS MONITORED — UNAUTHORIZED ACCESS WILL BE PROSECUTED — FBI CENTRAL INTELLIGENCE DIVISION — SECURE UPLINK ESTABLISHED ⬛";

const Corners = () => (<><div className="corner-tl"/><div className="corner-tr"/><div className="corner-bl"/><div className="corner-br"/></>);
const ScanLine = () => <div className="scan-line"/>;
const Divider = () => <hr className="divider"/>;
const PulseDot = ({color='#16a34a'}) => <div style={{width:8,height:8,borderRadius:'50%',background:color,boxShadow:`0 0 0 0 ${color}80`,animation:'pulseAnim 2s ease-in-out infinite'}}/>;
const Ticker = () => (
    <div style={{overflow:'hidden',background:'rgba(0,0,0,0.5)',borderTop:'1px solid rgba(201,168,76,0.1)',borderBottom:'1px solid rgba(201,168,76,0.1)',padding:'4px 0'}}>
        <p className="ticker-inner mono" style={{color:'#253525',fontSize:'0.55rem',letterSpacing:'0.08em'}}>{TICKER} &nbsp;&nbsp;&nbsp; {TICKER}</p>
    </div>
);

const App = () => {
    const [screen,       setScreen]       = useState('home');
    const [activeTab,    setActiveTab]    = useState('dashboard');
    const [activeModal,  setActiveModal]  = useState(null);
    const [itemToEdit,   setItemToEdit]   = useState(null);
    const [currentUser,  setCurrentUser]  = useState(null);
    const [searchQuery,  setSearchQuery]  = useState('');
    const [chatMsg,      setChatMsg]      = useState('');
    const [chatLog,      setChatLog]      = useState([]);
    const [activityLog,  setActivityLog]  = useState([]);
    const [loginError,   setLoginError]   = useState('');
    const [loginLoading, setLoginLoading] = useState(false);
    const [allUsers,     setAllUsers]     = useState([]);
    const [allWanted,    setAllWanted]    = useState([]);
    const [allCases,     setAllCases]     = useState([]);
    const [allCivilians, setAllCivilians] = useState([]);
    const chatEndRef = useRef(null);

    useEffect(() => {
        if (!window.fbTools) return;
        const db = window.fbDB, T = window.fbTools;
        const u1 = T.onSnapshot(T.collection(db,'users'),     s => setAllUsers(s.docs.map(d=>({...d.data(),id:d.id}))));
        const u2 = T.onSnapshot(T.collection(db,'wanted'),    s => setAllWanted(s.docs.map(d=>({...d.data(),id:d.id}))));
        const u3 = T.onSnapshot(T.collection(db,'civilians'), s => setAllCivilians(s.docs.map(d=>({...d.data(),id:d.id}))));
        const q  = T.query(T.collection(db,'fbi_cases'),T.orderBy('createdAt','desc'));
        const u4 = T.onSnapshot(q, s => setAllCases(s.docs.map(d=>({...d.data(),id:d.id}))));
        return () => { u1(); u2(); u3(); u4(); };
    }, []);

    useEffect(() => { chatEndRef.current?.scrollIntoView({behavior:'smooth'}); }, [chatLog]);

    const addLog = (action) => {
        const now = new Date();
        setActivityLog(prev => [{ time:now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'}), action, user:currentUser?.name||'SYSTEM' }, ...prev].slice(0,50));
    };

    const doLogin = () => {
        const email = document.getElementById('auth_email').value.trim();
        const pass  = document.getElementById('auth_password').value.trim();
        setLoginError(''); setLoginLoading(true);
        setTimeout(() => {
            if (email === 'admin@fbi.gov' && pass === '123456') {
                const admin = { name:'System Administrator', rank:'Director', access:'command', id:'admin@fbi.gov' };
                setCurrentUser(admin); setScreen('app'); setLoginLoading(false);
                setTimeout(() => addLog('Authenticated — Director access granted'), 100);
                return;
            }
            const match = allUsers.find(u => u.id === email && u.password === pass);
            if (match) {
                setCurrentUser(match); setScreen('app'); setLoginLoading(false);
                setTimeout(() => addLog(`Authenticated — ${match.rank} access granted`), 100);
            } else {
                setLoginError('ACCESS DENIED — INVALID CREDENTIALS'); setLoginLoading(false);
            }
        }, 1200);
    };

    const doLogout = () => { addLog('Session terminated'); setCurrentUser(null); setScreen('home'); setActiveTab('dashboard'); };
    const isPrivileged = currentUser?.access === 'command';

    const handleSubmit = async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        const db = window.fbDB, T = window.fbTools;
        const colMap = { case_form:'fbi_cases', wanted_form:'wanted', civilian_form:'civilians', staff_form:'users' };
        const col = colMap[activeModal];
        try {
            if (activeModal === 'civilian_form' && !itemToEdit) {
                const dup = allCivilians.find(c => c.sonyId === data.sonyId);
                if (dup) { alert(`ERROR: ID ${data.sonyId} already registered to ${dup.name}`); return; }
            }
            if (itemToEdit) {
                await T.updateDoc(T.doc(db,col,itemToEdit.id), {...data, lastModifiedBy:currentUser.name});
                addLog(`Record updated — ${col}`);
            } else {
                const rec = {...data, author:currentUser.name, authorRank:currentUser.rank, createdAt:T.serverTimestamp()};
                if (col === 'users') await T.setDoc(T.doc(db,col,data.id), rec);
                else await T.addDoc(T.collection(db,col), rec);
                addLog(`New record — ${col}`);
            }
            setActiveModal(null); setItemToEdit(null);
        } catch(err) { alert('Database error: '+err.message); }
    };

    const deleteEntry = async (col, id) => {
        if (!window.confirm('Confirm permanent deletion?')) return;
        await window.fbTools.deleteDoc(window.fbTools.doc(window.fbDB,col,id));
        addLog(`Deleted record — ${col}`);
    };

    const sendChat = () => {
        if (!chatMsg.trim()) return;
        setChatLog(prev => [...prev, {from:currentUser.name, msg:chatMsg.trim(), time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}]);
        setChatMsg('');
    };

    /* ─── HOME ─── */
if (screen === 'home') return (
        <div style={{background:'radial-gradient(ellipse at 15% 50%, rgba(139,0,0,0.18) 0%, transparent 55%), linear-gradient(180deg,#010308 0%,#04091a 60%,#010308 100%)', minHeight:'100vh', display:'flex', flexDirection:'column', overflow:'hidden', position:'relative'}}>
            <ScanLine/>
            <Ticker/>
            {/* top bar */}
            <div style={{background:'rgba(2,6,16,0.98)', borderBottom:'1px solid var(--border-gold)', padding:'12px 20px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <div style={{display:'flex', alignItems:'center', gap:12}}>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Seal_of_the_Federal_Bureau_of_Investigation.svg" style={{width:28,height:28,opacity:0.75}} alt="seal"/>
                    <div>
                        <p className="mono" style={{color:'var(--gold)',fontSize:'0.55rem',letterSpacing:'0.22em'}}>FEDERAL BUREAU OF INVESTIGATION</p>
                        <p className="mono" style={{color:'#1a2a1a',fontSize:'0.48rem',letterSpacing:'0.15em'}}>CRIMINAL JUSTICE INFORMATION SERVICES — TERMINAL v4.1</p>
                    </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <PulseDot/>
                    <span className="mono" style={{color:'#1a3a1a',fontSize:'0.5rem',letterSpacing:'0.1em'}}>UPLINK ACTIVE</span>
                </div>
            </div>
            {/* hero */}
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 24px',textAlign:'center',animation:'fadeUp 0.8s ease both'}}>
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Seal_of_the_Federal_Bureau_of_Investigation.svg"
                     style={{width:110,height:110,marginBottom:28,animation:'sealPulse 4s ease-in-out infinite',filter:'drop-shadow(0 0 25px rgba(201,168,76,0.4))'}} alt="FBI Seal"/>
                
                {/* تم تغيير المسمى هنا إلى Criminal Investigative Division */}
                <p className="mono" style={{color:'#2a3a2a',letterSpacing:'0.5em',fontSize:'0.6rem',marginBottom:16}}>Truth is our priority… and justice is our mission.</p>
                
                <h1 className="hero-title" style={{marginBottom:20, fontSize:'clamp(1.5rem, 5vw, 3.8rem)', whiteSpace:'nowrap', letterSpacing:'0.02em'}}>
    FEDERAL BUREAU OF INVESTIGATION
</h1>
                
                <div className="classified-stripe" style={{padding:'5px 20px',margin:'20px 0'}}>
                    <span className="display" style={{letterSpacing:'0.3em',fontSize:'0.85rem',color:'white'}}>LAW ENFORCEMENT SENSITIVE // FOUO</span>
                </div>
                <p className="mono" style={{color:'#2a2a40',fontSize:'0.65rem',letterSpacing:'0.2em',marginBottom:32,maxWidth:280,lineHeight:1.8}}>OFFICIAL USE ONLY<br/>FEDERAL LAW ENFORCEMENT NETWORK</p>
                
                <div style={{width:'100%', maxWidth:320, marginTop:10}}>
                    <button className="btn-gold" style={{width:'100%', display:'flex', alignItems:'center', justifyContent:'center', gap:12, padding:'16px 0'}} onClick={() => setScreen('login')}>
                        <i className="fas fa-shield-halved" style={{fontSize:'1.1rem'}}/>
                        <span style={{letterSpacing:'0.15em'}}>INITIALIZE SECURE LOGIN</span>
                    </button>
                </div>
            </div>
            <div style={{padding:'12px 24px',borderTop:'1px solid rgba(255,255,255,0.04)',display:'flex',justifyContent:'space-between'}}>
                <span className="mono" style={{color:'#111',fontSize:'0.5rem',letterSpacing:'0.12em'}}>DOJ // FBI // FIELD OFFICE</span>
                <span className="mono" style={{color:'#111',fontSize:'0.5rem',letterSpacing:'0.12em'}}>{new Date().toUTCString().toUpperCase()}</span>
            </div>
        </div>
    );
    /* ─── LOGIN ─── */
    if (screen === 'login') return (
        <div style={{height:'100vh',width:'100vw',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:'radial-gradient(ellipse at center,#040b20 0%,#020610 100%)',animation:'fadeIn 0.4s ease'}}>
            <ScanLine/>
            <div className="glass-card" style={{width:'100%',maxWidth:400,padding:32,animation:'fadeUp 0.5s ease'}}>
                <Corners/>
                <ScanLine/>
                <div style={{textAlign:'center',marginBottom:28}}>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Seal_of_the_Federal_Bureau_of_Investigation.svg"
                         style={{width:64,height:64,margin:'0 auto 16px',filter:'drop-shadow(0 0 20px rgba(201,168,76,0.4))'}} alt="seal"/>
                    <h2 className="display" style={{letterSpacing:'0.25em',fontSize:'1.3rem',color:'var(--gold)',marginBottom:4}}>FBI ACCESS TERMINAL</h2>
                    <p className="mono" style={{color:'#223',fontSize:'0.55rem',letterSpacing:'0.3em'}}>CLASSIFIED INFORMATION SYSTEM</p>
                </div>
                <Divider/>
                <div style={{display:'flex',flexDirection:'column',gap:16,marginTop:20}}>
                    <div>
                        <label className="mono" style={{display:'block',marginBottom:8,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>AGENT EMAIL</label>
                        <input id="auth_email" type="text" placeholder="agent@fbi.gov" className="fbi-input" onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
                    </div>
                    <div>
                        <label className="mono" style={{display:'block',marginBottom:8,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>ACCESS CODE</label>
                        <input id="auth_password" type="password" placeholder="••••••••" className="fbi-input" onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
                    </div>
                    {loginError && (

const ChatTab = () => {
        const [rawText, setRawText] = React.useState('');
        const [cipherText, setCipherText] = React.useState('');
        const [decodeInput, setDecodeInput] = React.useState('');
        const [decodedResult, setDecodedResult] = React.useState('');

        // نظام التشفير الرقمي المطور (FBI-HEX-v5) - يدعم العربي 100%
        const encrypt = (text) => {
            if (!text) return '';
            try {
                // تحويل النص إلى HEX لضمان عدم ضياع الحروف العربية
                const encoder = new TextEncoder();
                const v = encoder.encode(text);
                let hex = Array.from(v).map(b => b.toString(16).padStart(2, '0')).join('');
                
                // إضافة لمسة تشفير (تبديل أرقام برموز فخمة)
                const map = {'0':'X', '1':'V', '2':'I', '3':'A', '4':'B', '5':'S', '6':'T', '7':'Z', '8':'K', '9':'P'};
                return hex.split('').map(char => map[char] || char).join('·').toUpperCase();
            } catch(e) { return "ERROR"; }
        };

        const decrypt = (cipher) => {
            if (!cipher) return '';
            try {
                const rev = {'X':'0', 'V':'1', 'I':'2', 'A':'3', 'B':'4', 'S':'5', 'T':'6', 'Z':'7', 'K':'8', 'P':'9'};
                const clean = cipher.split('·').map(c => rev[c] || c).join('').toLowerCase();
                
                // تحويل الـ HEX مرة أخرى إلى نص عربي
                const bytes = new Uint8Array(clean.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                const decoder = new TextDecoder();
                return decoder.decode(bytes);
            } catch (e) { return "خطأ: تأكد من نسخ الشفرة كاملة وبدون مسافات"; }
        };

        return (
            <div className="animate-fade-up" style={{display:'flex', flexDirection:'column', gap:20}}>
                <p className="display" style={{fontSize:'1.1rem', color:'var(--gold)', letterSpacing:'0.15em'}}>ENIGMA CRYPTOGRAPHIC TERMINAL</p>
                
                <div style={{display:'flex', flexDirection:'column', gap:20}}>
                    <div className="glass-card" style={{padding:24, borderLeft:'4px solid var(--gold)'}}>
                        <Corners/>
                        <p className="display" style={{fontSize:'0.75rem', color:'var(--gold)', marginBottom:15}}>ENCRYPTION UNIT</p>
                        <textarea 
                            className="fbi-input" 
                            style={{height:80, fontSize:'0.9rem', marginBottom:15}} 
                            placeholder="اكتب رسالتك بالعربي هنا..."
                            value={rawText}
                            onChange={(e) => {
                                setRawText(e.target.value);
                                setCipherText(encrypt(e.target.value));
                            }}
                        />
                        <div className="mono" style={{background:'rgba(0,0,0,0.5)', padding:15, border:'1px dashed var(--border-gold)'}}>
                            <p style={{fontSize:'0.5rem', color:'#556', marginBottom:5}}>GENERATED CIPHER:</p>
                            <p style={{fontSize:'0.8rem', color:'#4ade80', wordBreak:'break-all'}}>{cipherText || "AWAITING DATA..."}</p>
                            {cipherText && <button onClick={() => navigator.clipboard.writeText(cipherText)} style={{marginTop:10, color:'var(--gold)', fontSize:'0.6rem', background:'none', border:'1px solid rgba(201,168,76,0.2)', padding:'4px 8px', cursor:'pointer'}}>COPY CODE</button>}
                        </div>
                    </div>

                    <div className="glass-card" style={{padding:24, borderLeft:'4px solid var(--crimson-bright)'}}>
                        <Corners/>
                        <p className="display" style={{fontSize:'0.75rem', color:'var(--crimson-bright)', marginBottom:15}}>DECRYPTION UNIT</p>
                        <textarea 
                            className="fbi-input" 
                            style={{height:80, fontSize:'0.9rem', marginBottom:15}} 
                            placeholder="الصق الشفرة هنا..."
                            value={decodeInput}
                            onChange={(e) => setDecodeInput(e.target.value)}
                        />
                        <button className="btn-gold" style={{width:'100%', marginBottom:15}} onClick={() => setDecodedResult(decrypt(decodeInput))}>DECODE SIGNAL</button>
                        <div className="mono" style={{background:'rgba(255,255,255,0.02)', padding:15, border:'1px solid var(--border-dim)'}}>
                            <p style={{fontSize:'0.5rem', color:'#556', marginBottom:5}}>ORIGINAL MESSAGE:</p>
                            <p style={{fontSize:'1rem', color:'#fff'}}>{decodedResult || "---"}</p>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

const OpsCenterTab = () => {
    // --- States (الحالات) ---
    const [onDuty, setOnDuty] = React.useState([]); 
    const [isDuty, setIsDuty] = React.useState(false); 
    const [fieldCommander, setFieldCommander] = React.useState(null); 
    const [isDistributing, setIsDistributing] = React.useState(false); 
    const [selectedForDist, setSelectedForDist] = React.useState(null); 
    const [markers, setMarkers] = React.useState([]); 

    // --- Functions (الوظائف) ---

    // وظيفة بدء وإنهاء الخدمة الميدانية
    const toggleDuty = () => {
        if (!isDuty) {
            const newUser = {
                id: Date.now(),
                name: currentUser.name,
                rank: currentUser.rank,
                img: "https://i.imgur.com/6VBx3io.png", 
                startTime: new Date()
            };
            setOnDuty([...onDuty, newUser]);
        } else {
            setOnDuty(onDuty.filter(u => u.name !== currentUser.name));
            if (fieldCommander === currentUser.name) setFieldCommander(null);
            // حذف الدبوس تلقائياً عند الخروج
            setMarkers(markers.filter(m => m.name !== currentUser.name));
        }
        setIsDuty(!isDuty);
    };

    // وظيفة وضع الدبوس (Marker) وتحديث الموقع
    const handleMapClick = (e) => {
        if (isDistributing && selectedForDist) {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            
            // مسح أي موقع قديم لنفس الشخص قبل إضافة الجديد
            const otherMarkers = markers.filter(m => m.name !== selectedForDist.name);
            const newMarker = { 
                id: Date.now(), 
                name: selectedForDist.name, 
                x: x, 
                y: y 
            };

            setMarkers([...otherMarkers, newMarker]);
            setIsDistributing(false); 
            setSelectedForDist(null);
        }
    };

    // حساب مدة الخدمة بالدقائق
    const getDuration = (start) => {
        const diff = Math.floor((new Date() - start) / 60000);
        return `${diff}m`;
    };

    return (
        <div className="ops-wrapper" style={{display:'flex', flexDirection:'column', gap:15, height:'calc(100vh - 180px)', position:'relative'}}>
            
            {/* تنسيق خاص لإزاحة الأزرار العائمة عن الخريطة */}
            <style>{`
                div[onClick*="case_form"] { 
                    left: 94% !important; 
                    bottom: 25px !important;
                    transform: scale(0.6) !important;
                    opacity: 0.3;
                    z-index: 50 !important;
                }
            `}</style>

            {/* الأزرار العلوية */}
            <div style={{display:'flex', gap:10}}>
                <button className={isDuty ? "btn-crimson" : "btn-gold"} style={{flex:1, padding:12}} onClick={toggleDuty}>
                    <i className="fas fa-satellite" style={{marginRight:8}}/>
                    {isDuty ? "END FIELD DUTY" : "START FIELD DUTY"}
                </button>
                {fieldCommander === currentUser.name && (
                    <button className="btn-gold" style={{flex:1, border:'1px solid #4ade80', color:'#4ade80'}} onClick={() => setMarkers([])}>
                        <i className="fas fa-trash-can" style={{marginRight:8}}/> CLEAR ALL POSITIONS
                    </button>
                )}
            </div>

            <div style={{display:'flex', gap:15, flex:1, minHeight:0}}>
                
                {/* الخريطة التكتيكية */}
                <div className="glass-card" 
                     style={{flex:2.5, position:'relative', overflow:'hidden', cursor: isDistributing ? 'crosshair' : 'default', background:'#000', border:'1px solid var(--border-gold)'}} 
                     onClick={handleMapClick}>
                    <Corners/>
                    
                    {/* عرض الصورة المخزنة محلياً */}
                    <img 
                        src={mapImageData} 
                        style={{width:'100%', height:'100%', objectFit:'contain', display:'block'}} 
                        alt="Tactical Map"
                    />
                    
                    {/* توزيع الدبابيس على الخريطة */}
                    {markers.map(m => (
                        <div key={m.id} style={{position:'absolute', left: `${m.x}%`, top: `${m.y}%`, transform:'translate(-50%, -100%)', pointerEvents:'none', zIndex:100}}>
                            <i className="fas fa-location-dot" style={{color:'var(--gold)', fontSize:'1.6rem', filter:'drop-shadow(0 0 5px #000)'}}/>
                            <div className="mono" style={{background:'rgba(0,0,0,0.95)', color:'#fff', padding:'2px 8px', borderRadius:2, fontSize:'0.55rem', marginTop:2, border:'1px solid var(--gold)', whiteSpace:'nowrap', boxShadow:'0 0 10px #000'}}>
                                {m.name}
                            </div>
                        </div>
                    ))}
                </div>

                {/* قائمة الوحدات الجانبية */}
                <div className="glass-card" style={{flex:1, padding:15, display:'flex', flexDirection:'column', gap:12, overflowY:'auto'}}>
                    <Corners/>
                    <p className="display" style={{fontSize:'0.75rem', color:'var(--gold)', letterSpacing:'0.15em'}}>ACTIVE UNITS</p>
                    
                    {onDuty.length === 0 && <p className="mono" style={{fontSize:'0.6rem', color:'#445', textAlign:'center', marginTop:25}}>NO ACTIVE UNITS</p>}

                    {onDuty.map(u => (
                        <div key={u.id} className="log-entry" style={{padding:'10px 8px', display:'flex', alignItems:'center', gap:10, background:'rgba(255,255,255,0.02)', border:'1px solid rgba(201,168,76,0.1)'}}>
                            <img src={u.img} style={{width:35, height:35, borderRadius:3, border:'1px solid #222'}} />
                            <div style={{flex:1, cursor:'pointer'}} onClick={() => {
                                // تعيين المسؤول الميداني عند النقر على الاسم
                                if(confirm(`Set ${u.name} as Field Commander?`)) setFieldCommander(u.name);
                            }}>
                                <p style={{fontSize:'0.8rem', fontWeight:'700', color: fieldCommander === u.name ? 'var(--gold)' : '#eee'}}>
                                    {u.name} {fieldCommander === u.name && <i className="fas fa-crown" style={{fontSize:'0.6rem', marginLeft:4, color:'var(--gold)'}}/>}
                                </p>
                                <p className="mono" style={{fontSize:'0.45rem', color:'#667', textTransform:'uppercase'}}>{u.rank} • {getDuration(u.startTime)}</p>
                            </div>
                            
                            {/* زر التوزيع يظهر فقط للمسؤول الميداني */}
                            {fieldCommander === currentUser.name && (
                                <button className="btn-gold" style={{padding:'5px 8px', fontSize:'0.5rem', fontWeight:'bold'}} onClick={() => {
                                    setSelectedForDist(u);
                                    setIsDistributing(true);
                                }}>DEPLOY</button>
                            )}
                        </div>
                    ))}
                </div>
            </div>

            {/* إشعار حالة التوزيع */}
            {isDistributing && (
                <div style={{position:'absolute', bottom:100, left:'50%', transform:'translateX(-50%)', background:'var(--gold)', color:'#000', padding:'10px 30px', borderRadius:2, zIndex:200, fontWeight:'900', fontSize:'0.7rem', border:'2px solid #000', boxShadow:'0 0 20px rgba(201,168,76,0.5)'}} className="animate-pulse mono">
                    <i className="fas fa-crosshairs" style={{marginRight:10}}/> CLICK MAP TO DEPLOY: {selectedForDist?.name}
                </div>
            )}
        </div>
    );
};
    const LogsTab = () => (
        <div className="animate-fade-up" style={{display:'flex',flexDirection:'column',gap:14}}>
            <p className="display" style={{fontSize:'1.1rem',color:'var(--gold)',letterSpacing:'0.15em'}}>ACTIVITY LOG</p>
            <div className="glass-card" style={{overflow:'hidden'}}>
                <Corners/>
                {activityLog.length===0 && <div style={{textAlign:'center',padding:40,color:'#112'}}><p className="mono" style={{fontSize:'0.65rem',letterSpacing:'0.2em'}}>NO ACTIVITY RECORDED</p></div>}
                {activityLog.map((l,i)=>(
                    <div key={i} className="log-entry">
                        [<span className="t">{l.time}</span>] &nbsp;<span className="u">{l.user}</span>&nbsp;—&nbsp;<span className="a">{l.action}</span>
                    </div>
                ))}
            </div>
        </div>
    );

    /* ─── MODAL ─── */
    const titles = { case_form:'CASE FILE', wanted_form:'WANTED TARGET', civilian_form:'CIVILIAN RECORD', staff_form:'AGENT PROFILE' };
    const Modal = () => !activeModal ? null : (
        <div className="modal-overlay">
            <div className="glass-card" style={{width:'100%',maxWidth:420,padding:24,overflowY:'auto',maxHeight:'90vh'}}>
                <Corners/>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                    <h3 className="display" style={{fontSize:'1.1rem',color:'var(--gold)',letterSpacing:'0.2em'}}>{itemToEdit?'EDIT':'NEW'} {titles[activeModal]}</h3>
                    <button className="mono" style={{color:'#334',fontSize:'0.65rem',letterSpacing:'0.1em'}} onClick={()=>{setActiveModal(null);setItemToEdit(null);}}>
                        <i className="fas fa-times" style={{marginRight:4}}/> CLOSE
                    </button>
                </div>
                <Divider/>
                <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:14,marginTop:16}}>
                    {activeModal==='case_form' && <>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>CASE TITLE</label><input name="title" className="fbi-input" placeholder="Case codename..." defaultValue={itemToEdit?.title} required/></div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>INCIDENT REPORT</label><textarea name="details" className="fbi-input" style={{height:88}} placeholder="Detailed incident description..." defaultValue={itemToEdit?.details} required/></div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>SUSPECTS</label><input name="suspects" className="fbi-input" placeholder="Known suspects..." defaultValue={itemToEdit?.suspects} required/></div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>STATUS</label>
                            <select name="status" className="fbi-input" defaultValue={itemToEdit?.status||'Open'}>
                                <option value="Open">OPEN — Under Investigation</option>
                                <option value="Closed">CLOSED — Case Resolved</option>
                            </select>
                        </div>
                    </>}
                    {activeModal==='wanted_form' && <>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>FULL NAME</label><input name="name" className="fbi-input" placeholder="Subject full name..." required/></div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>PRIMARY CHARGE</label><input name="charge" className="fbi-input" placeholder="e.g. Armed Robbery, Homicide..." required/></div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>PHOTO URL</label><input name="image" className="fbi-input" placeholder="Direct image link..." required/></div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>THREAT LEVEL</label>
                            <select name="dangerLevel" className="fbi-input">
                                <option value="Extremely Dangerous">EXTREMELY DANGEROUS</option>
                                <option value="Moderate">MODERATE THREAT</option>
                                <option value="Low">LOW THREAT</option>
                            </select>
                        </div>
                    </>}
                    {activeModal==='civilian_form' && <>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>FULL NAME</label><input name="name" className="fbi-input" placeholder="Civilian full name..." defaultValue={itemToEdit?.name} required/></div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>NATIONAL ID</label><input name="sonyId" className="fbi-input" placeholder="Citizen ID number..." defaultValue={itemToEdit?.sonyId} required disabled={!!itemToEdit}/></div>
                    </>}
                    {activeModal==='staff_form' && <>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>AGENT EMAIL</label><input name="id" className="fbi-input" placeholder="agent@fbi.gov" defaultValue={itemToEdit?.id} required/></div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>FULL NAME</label><input name="name" className="fbi-input" placeholder="Agent full name..." defaultValue={itemToEdit?.name} required/></div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>RANK</label>
                            <select name="rank" className="fbi-input" defaultValue={itemToEdit?.rank||'Special Agent'}>
                                {FBI_RANKS.map(r=><option key={r} value={r}>{r}</option>)}
                            </select>
                        </div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>CLEARANCE LEVEL</label>
                            <select name="access" className="fbi-input" defaultValue={itemToEdit?.access||'field'}>
                                <option value="field">FIELD AGENT</option>
                                <option value="command">COMMAND ACCESS</option>
                            </select>
                        </div>
                        <div><label className="mono" style={{display:'block',marginBottom:6,color:'#334',fontSize:'0.6rem',letterSpacing:'0.2em'}}>ACCESS CODE</label><input name="password" type="password" className="fbi-input" placeholder="Assign secure password..." defaultValue={itemToEdit?.password} required/></div>
                    </>}
                    <div style={{display:'flex',gap:10,paddingTop:8}}>
                        <button type="submit" className="btn-gold" style={{flex:1}}><i className="fas fa-save" style={{marginRight:8}}/>SAVE RECORD</button>
                        <button type="button" className="btn-ghost" style={{flex:1}} onClick={()=>{setActiveModal(null);setItemToEdit(null);}}>CANCEL</button>
                    </div>
                </form>
            </div>
        </div>
    );

    /* ─── MAIN LAYOUT ─── */
    const NAV = [
        {key:'dashboard', icon:'fa-shield-heart',   label:'ARCHIVE'},
        {key:'wanted',    icon:'fa-crosshairs',      label:'WANTED'},
        {key:'civilians', icon:'fa-fingerprint',     label:'CIVS'},
        {key:'ops',       icon:'fa-map-location-dot',label:'OPS'},
        {key:'staff',     icon:'fa-user-gear',       label:'AGENTS'},
        {key:'chat',      icon:'fa-satellite-dish',  label:'CHANNEL'},
        {key:'logs',      icon:'fa-terminal',        label:'LOGS'},
    ];

    return (
        <div style={{height:'100vh',width:'100vw',display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <ScanLine/>
            {/* HEADER */}
            <div style={{background:'rgba(2,6,16,0.98)',borderBottom:'1px solid var(--border-gold)',padding:'12px 18px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Seal_of_the_Federal_Bureau_of_Investigation.svg" style={{width:26,height:26,opacity:0.7}} alt="seal"/>
                    <div>
                        <p style={{fontWeight:700,fontSize:'0.85rem',letterSpacing:'0.05em'}}>{currentUser.name}</p>
                        <p className="mono" style={{color:'var(--gold)',fontSize:'0.55rem',letterSpacing:'0.2em'}}>{currentUser.rank}</p>
                    </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{display:'flex',alignItems:'center',gap:6}}><PulseDot/><span className="mono" style={{color:'#1a3a1a',fontSize:'0.5rem',letterSpacing:'0.1em'}}>SECURE</span></div>
                    <button className="btn-ghost" style={{fontSize:'0.7rem',padding:'6px 12px',borderColor:'rgba(139,0,0,0.4)',color:'#cc4444'}} onClick={doLogout}>SIGN OUT</button>
                </div>
            </div>
            <Ticker/>
            {/* CONTENT */}
            <main style={{flex:1,overflowY:'auto',padding:'18px 16px 100px',scrollbarWidth:'thin'}}>
                {activeTab==='dashboard' && <DashboardTab/>}
                {activeTab==='wanted'    && <WantedTab/>}
                {activeTab==='civilians' && <CivilianTab/>}
                {activeTab==='staff'     && <StaffTab/>}
                {activeTab==='chat'      && <ChatTab/>}
                {activeTab==='logs'      && <LogsTab/>}
                {activeTab==='ops'       && <OpsCenterTab/>}
            </main>
            {/* BOTTOM NAV */}
            <nav className="bottom-nav" style={{position:'fixed',bottom:0,width:'100%',padding:'10px 4px',display:'flex',justifyContent:'space-around',alignItems:'center',zIndex:200}}>
                {NAV.map(n => (
                    <div key={n.key} className={`nav-item ${activeTab===n.key?'active':''}`} onClick={()=>setActiveTab(n.key)}>
                        <i className={`fas ${n.icon}`} style={{fontSize:'1.05rem'}}/>
                        <span className="mono" style={{fontSize:'0.42rem',letterSpacing:'0.12em'}}>{n.label}</span>
                    </div>
                ))}
            </nav>
            {/* FAB */}
            <div onClick={()=>setActiveModal('case_form')} style={{position:'fixed',bottom:36,left:'50%',transform:'translateX(-50%)',width:52,height:52,borderRadius:'50%',background:'linear-gradient(135deg,#1a3a8a,#1d4ed8)',border:'3px solid #020610',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:'1.1rem',boxShadow:'0 0 30px rgba(29,78,216,0.4)',cursor:'pointer',zIndex:300,transition:'all 0.2s'}}>
                <i className="fas fa-plus"/>
            </div>
            <Modal/>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
